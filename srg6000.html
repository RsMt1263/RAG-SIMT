<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>R&G SRG-6000P Profesionál</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: white;
            overflow: auto;
        }

        .computer-frame {
            width: 1000px;
            height: 667px;
            background-image: url('textura.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            position: relative;
            transition: transform 0.2s ease-in-out;
            transform-origin: top center; 
            margin-top: 20px;
        }

        #clock { position: absolute; top: 80px; right: 240px; font-size: 40px; color: #fff; }
        #direction { position: absolute; top: 136px; left: 175px; width: 820px; font-size: 35px; color: #ccc; text-align: left; }
        .line-info { position: absolute; top: 189px; left: 244px; font-size: 22px; }
        .vehicle-info { position: absolute; top: 189.5px; right: 380px; font-size: 20px; }
        .stop-count { position: absolute; top: 213px; left: 280px; font-size: 20px; }
        
        #marker {
            position: absolute;
            top: 267px;
            left: 170px;
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 22px solid #5cb85c;
            transition: left 0.5s ease;
        }

        .current-stop-container { position: absolute; top: 343px; left: 75px; width: 785px; text-align: center; }
        #stop-name { font-size: 24px; margin: 0; }
        #street-name { font-size: 24px; color: #eee; margin: 0; }

        .prev-stops { position: absolute; top: 404px; left: 135px; width: 275px; text-align: center; font-size: 18px; }
        .next-stops { position: absolute; top: 404.5px; right: 195px; width: 275px; text-align: center; font-size: 18px; }
        .stop-item { height: 32px; display: flex; align-items: center; justify-content: center; }
        
        #delay {
            position: absolute;
            top: 412px;
            left: 330px;
            width: 280px;
            font-size: 45px;
            text-align: center;
            color: #fff;
        }

        .btn-overlay { position: absolute; cursor: pointer; z-index: 10; }
    </style>
</head>
<body>
    <div class="computer-frame" id="mainFrame" onclick="pipni()">
        <div id="clock">00:00:00</div>
        <div id="direction">---</div>
        <div class="line-info">-</div>
        <div class="vehicle-info">803</div>
        <div class="stop-count"><span id="curr-idx">0</span>/0</div>
        <div id="marker"></div>
        <div class="current-stop-container">
            <p id="stop-name">---</p>
            <p id="street-name">---</p>
        </div>
        <div class="prev-stops">
            <div class="stop-item" id="p2">-</div>
            <div class="stop-item" id="p1">-</div>
        </div>
        <div id="delay">00:00</div>
        <div class="next-stops">
            <div class="stop-item" id="n1">-</div>
            <div class="stop-item" id="n2">-</div>
        </div>
        <div class="btn-overlay" style="top: 155px; left: 95px; width: 65px; height: 65px;" onclick="nasledujuciSpoj()"></div>
        <div class="btn-overlay" style="top: 495px; left: 340px; width: 70px; height: 65px;" onclick="move(-1)"></div>
        <div class="btn-overlay" style="top: 495px; left: 565px; width: 40px; height: 65px;" onclick="move(1)"></div>
        <div class="btn-overlay" style="top: 495px; left: 630px; width: 155px; height: 70px;" onclick="logout()"></div>
    </div>

    <audio id="click-sound" src="zvuk1.wav" preload="auto"></audio>

<script>

];

    {n: "Sídlisko III", u: "Prostějovská ul.", min: 0}, {n: "U Pošty", u: "Burešova ul.", min: 1}, {n: "Václava Volfa", u: "Okružní ul.", min: 2}, {n: "Okružní", u: "Okružní ul.", min: 3}, {n: "V Osadách", u: "Okružní ul.", min: 4}, {n: "Háje, Hypermarket", u: "Okružní ul.", min: 5}, {n: "Severní Předměstí", u: "Pivovarská ul.", min: 6}, {n: "Pivovarská", u: "Pivovarská ul.", min: 7}, {n: "Hlavní Nádraží", u: "Pivovarská ul.", min: 8}, {n: "Pražská", u: "Pražská ul.", min: 10}, {n: "Na Rúžku", u: "Pražská ul.", min: 11}, {n: "Spojovací", u: "Pražská ul.", min: 12}, {n: "Na Lukách", u: "Hornická ul.", min: 14}, {n: "Hornická", u: "Hornická ul.", min: 15}, {n: "U Kasáren", u: "Hornická ul.", min: 16}, {n: "U Školky", u: "Heršpická Třída", min: 17}, {n: "Heršpická Třída", u: "Heršpická Třída", min: 18}, {n: "Evropská", u: "Evropská ul.", min: 20}, {n: "Dopravný Podnik", u: "Evropská ul.", min: 21}, {n: "Zborovská", u: "Zborovská ul.", min: 23}, {n: "Nákupní Zóna", u: "Zborovská ul.", min: 24}, {n: "Technická", u: "Technická ul.", min: 25}, {n: "Prúmyslová", u: "Technická ul.", min: 26}, {n: "Pod Šalgovíkom", u: "Vansovej ul.", min: 27}
];

const trasaL34_Pod_Salgovikom_Sidl_III = [
    {n: "Pod Šalgovíkom", u: "Vansovej ul.", min: 0}, {n: "Prúmyslová", u: "Technická ul.", min: 1}, {n: "Technická", u: "Technická ul.", min: 2}, {n: "Nákupní Zóna", u: "Zborovská ul.", min: 3}, {n: "Zborovská", u: "Zborovská ul.", min: 4}, {n: "Dopravný Podnik", u: "Evropská ul.", min: 5}, {n: "Evropská", u: "Evropská ul.", min: 6}, {n: "Heršpická Třída", u: "Heršpická Třída", min: 7}, {n: "U Školky", u: "Hornická ul.", min: 9}, {n: "U Kasáren", u: "Hornická ul.", min: 10}, {n: "Hornická", u: "Hornická ul.", min: 10}, {n: "Na Lukách", u: "Hornická ul.", min: 12}, {n: "Spojovací", u: "Pražská ul.", min: 14}, {n: "Na Rúžku", u: "Pražská ul.", min: 15}, {n: "Pražská", u: "Pražská ul.", min: 17}, {n: "Hlavní Nádraží", u: "Pivovarská ul.", min: 19}, {n: "Pivovarská", u: "Pivovarská ul.", min: 20}, {n: "Severní Předměstí", u: "Pivovarská ul.", min: 21}, {n: "Háje, Hypermarket", u: "Okružní ul.", min: 22}, {n: "V Osadách", u: "Okružní ul.", min: 24}, {n: "Okružní", u: "Okružní ul.", min: 25}, {n: "Václava Volfa", u: "Okružní ul.", min: 26}, {n: "U Pošty", u: "Burešova ul.", min: 27}, {n: "Sídlisko III", u: "Prostějovská ul.", min: 28}
];

// Linka 32 (využívaná kurzom 31/21)
const trasaL32A_Okruzna = [
    {n: "Sibírska", u: "Vihorlatská ul.", min: 0}, {n: "SŠ Tech. a dopravní", u: "Lázeňská ul.", min: 1}, {n: "Městské Lázně", u: "Spolková ul.", min: 2}, {n: "U Lišky", u: "Spolková ul.", min: 3}, {n: "Aut. Nádraží Spolková", u: "Spolková ul.", min: 4}, {n: "Marie Sklodowské", u: "Ul. M. Sklodowské", min: 5}, {n: "Náměstí Osvobození", u: "Obchodní ul.", min: 7}, {n: "Obchodní", u: "Obchodní ul.", min: 8}, {n: "Karlovo Náměstí", u: "Obchodní ul.", min: 9}, {n: "Pražská", u: "Fibichova ul.", min: 11}, {n: "Fibichova", u: "Fibichova ul.", min: 12}, {n: "Nové Výstaviště", u: "Fibichova ul.", min: 13}, {n: "Okružná", u: "Okružná ul.", min: 15}
];

const trasaL32_Sibirska = [
    {n: "Okružná", u: "Okružná ul.", min: 0}, {n: "Nové Výstaviště", u: "Fibichova ul.", min: 1}, {n: "Fibichova", u: "Fibichova ul.", min: 2}, {n: "Pražská", u: "Fibichova ul.", min: 3}, {n: "U Viaduktu", u: "Obchodní ul.", min: 4}, {n: "Karlovo Náměstí", u: "Obchodní ul.", min: 5}, {n: "Obchodní", u: "Obchodní ul.", min: 6}, {n: "Náměstí Osvobození", u: "Obchodní ul.", min: 7}, {n: "Marie Sklodowské", u: "Ul. M. Sklodowské", min: 9}, {n: "Aut. Nádraží Spolková", u: "Spolková ul.", min: 10}, {n: "U Lišky", u: "Spolková ul.", min: 11}, {n: "Městské Lázně", u: "Spolková ul.", min: 13}, {n: "SŠ Tech. a dopravní", u: "Lázeňská ul.", min: 14}, {n: "Sibírska", u: "Vihorlatská ul.", min: 15}
];

// ==========================================
// 2. GRAFIKON KURZU 31/21
// ==========================================

const kurz_31_21 = [
    // Ranná časť
    { L: "#",  smer: "Technologická Jazda", odchod: "04:57", trasa: trasaG_Sibirska },
    { L: "34", smer: "Sídlisko III", odchod: "05:02", trasa: trasaL34_Sibirska_Sidl_III },
    { L: "34", smer: "Pod Šalgovíkom", odchod: "05:55", trasa: trasaL34_Sidl_III_Pod_Salgovikom },
    { L: "34", smer: "Sídlisko III", odchod: "06:33", trasa: trasaL34_Pod_Salgovikom_Sidl_III },
    { L: "34", smer: "Pod Šalgovíkom", odchod: "07:25", trasa: trasaL34_Sidl_III_Pod_Salgovikom },
    { L: "#",  smer: "Technologická Jazda", odchod: "07:52", trasa: trasaSalgovik_G },

    // Poobedňajšia časť
    { L: "#",  smer: "Technologická Jazda", odchod: "13:08", trasa: trasaG_Sidl_III },
    { L: "34", smer: "Pod Šalgovíkom", odchod: "13:25", trasa: trasaL34_Sidl_III_Pod_Salgovikom },
    { L: "34", smer: "Sídlisko III", odchod: "14:03", trasa: trasaL34_Pod_Salgovikom_Sidl_III },
    { L: "34", smer: "Pod Šalgovíkom", odchod: "14:25", trasa: trasaL34_Sidl_III_Pod_Salgovikom },
    { L: "34", smer: "Sídlisko III", odchod: "15:33", trasa: trasaL34_Pod_Salgovikom_Sidl_III },
    { L: "34", smer: "Pod Šalgovíkom", odchod: "16:25", trasa: trasaL34_Sidl_III_Pod_Salgovikom },
    
    // Prejazd a pomocné linky
    { L: "#",  smer: "Technologická Jazda", odchod: "16:52", trasa: trasaSalgovik_Sibirska },
    { L: "32A", smer: "Okružná - Trojica", odchod: "17:26", trasa: trasaL32A_Okruzna },
    { L: "32",  smer: "Sibírska", odchod: "17:42", trasa: trasaL32_Sibirska },
    { L: "32A", smer: "Okružná - Trojica", odchod: "18:06", trasa: trasaL32A_Okruzna },
    { L: "32",  smer: "Sibírska", odchod: "18:22", trasa: trasaL32_Sibirska },
    
    // Záverečný dojazd
    { L: "#",  smer: "Technologická Jazda", odchod: "18:37", trasa: trasaSibirska_G }
];
    // ==========================================
    // 3. LOGIKA PROGRAMU (Univerzálna)
    // ==========================================

    let cestovnyPoriadok = []; // Tu sa nahrá poriadok podľa prihlásenia
    let indexSpoja = 0; 
    let currentIndex = 0;
    let aktivnySpoj, zastavky, startTime;
    let povolenyPristup = false;

    function zvacsiPanel() {
        const frame = document.getElementById('mainFrame');
        if (!frame) return;
        const scale = Math.min(window.innerWidth / 1000, window.innerHeight / 700) * 0.95;
        frame.style.transform = `scale(${scale})`;
    }

    window.addEventListener('resize', zvacsiPanel);

    function pipni() {
        const sound = document.getElementById('click-sound');
        if (sound) { sound.currentTime = 0; sound.play().catch(() => {}); }
    }

    function prihlasenie() {
        const l = localStorage.getItem('srg_linka');
        const p = localStorage.getItem('srg_poradie');
        
        // --- DYNAMICKÝ VÝBER KURZU ---
        if (l === "31" && p === "21") {
            cestovnyPoriadok = kurz_31_21;
            povolenyPristup = true;
        } 
        else if (l === "11" && p === "43") {
            cestovnyPoriadok = kurz_11_43;
            povolenyPristup = true;
        }
        else if (l === "31" && p === "11") {
            cestovnyPoriadok = kurz_31_11_1;
            povolenyPristup = true;
        }
        else if (l === "31" && p === "31") {
            cestovnyPoriadok = kurz_31_31;
            povolenyPristup = true;
        }
        // Sem môžeš doplniť ďalšie kurzy pomocou else if...

        if (povolenyPristup) {
            nacitajDataSpoja();
        } else {
            document.getElementById('direction').innerText = "NEPLATNÝ KURZ";
        }
        zvacsiPanel();
    }

    function nacitajDataSpoja() {
        if (!povolenyPristup || cestovnyPoriadok.length === 0) return;
        aktivnySpoj = cestovnyPoriadok[indexSpoja];
        zastavky = aktivnySpoj.trasa;
        currentIndex = 0;
        const [h, m] = aktivnySpoj.odchod.split(':');
        startTime = new Date();
        startTime.setHours(parseInt(h), parseInt(m), 0, 0);
        updateDisplay();
    }

    function updateDisplay() {
        if (!povolenyPristup || !zastavky) return;
        const current = zastavky[currentIndex];
        document.getElementById('direction').innerText = aktivnySpoj.smer;
        document.getElementById('stop-name').innerText = current.n;
        document.getElementById('street-name').innerText = current.u;
        document.querySelector('.line-info').innerText = aktivnySpoj.L;
        document.querySelector('.stop-count').innerHTML = `<span>${currentIndex}</span>/${zastavky.length - 1}`;
        
        document.getElementById('p1').innerText = currentIndex > 0 ? zastavky[currentIndex - 1].n : "-------";
        document.getElementById('p2').innerText = currentIndex > 1 ? zastavky[currentIndex - 2].n : "-------";
        document.getElementById('n1').innerText = currentIndex < zastavky.length - 1 ? zastavky[currentIndex + 1].n : "-------";
        document.getElementById('n2').innerText = currentIndex < zastavky.length - 2 ? zastavky[currentIndex + 2].n : "-------";
        
        let step = 620 / (zastavky.length - 1 || 1);
        document.getElementById('marker').style.left = (170 + (currentIndex * step)) + "px";
        updateDelay();
    }

    function nasledujuciSpoj() {
        if (!povolenyPristup) return;
        pipni();
        indexSpoja = (indexSpoja + 1) % cestovnyPoriadok.length;
        nacitajDataSpoja();
    }

    function move(dir) {
        if (!povolenyPristup) return;
        pipni();
        currentIndex += dir;
        if (currentIndex < 0) currentIndex = 0;
        if (currentIndex >= zastavky.length) currentIndex = zastavky.length - 1;
        updateDisplay();
    }

    function updateDelay() {
        if (!povolenyPristup) return;
        const now = new Date();
        const plannedTime = new Date(startTime.getTime() + zastavky[currentIndex].min * 60000);
        let diffMs = plannedTime - now;
        let absDiff = Math.abs(diffMs);
        let m = Math.floor(absDiff / 60000);
        let s = Math.floor((absDiff % 60000) / 1000);
        const delayEl = document.getElementById('delay');
        delayEl.innerText = (diffMs < 0 ? "-" : "+") + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
        
        if (diffMs > 0) {
            delayEl.style.color = (now.getSeconds() % 2 === 0) ? "#ffffff" : "#ff0000";
        } else {
            delayEl.style.color = "#ffffff";
        }
    }

    function logout() {
        pipni();
        localStorage.clear();
        setTimeout(() => { window.location.href = "menu.html"; }, 200);
    }

    setInterval(() => {
        const clockEl = document.getElementById('clock');
        if (clockEl) clockEl.innerText = new Date().toLocaleTimeString('sk-SK');
        if (povolenyPristup) updateDelay();
    }, 1000);

    window.onload = prihlasenie;
</script>
</body>
</html>
